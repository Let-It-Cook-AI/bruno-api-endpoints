info:
  name: Smart Replace
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:8080/core-api/recipe/{id}/smart-replace
  body:
    type: json
    data: |-
      {
        "targetIngredient": "Chicken",
        "userPrompt": "I want a vegan alternative",
        "substitute": "Tofu"
      }
