info:
  name: Replace Equipment
  type: http
  seq: 5

http:
  method: POST
  url: http://localhost:8080/core-api/recipe/{id}/replace-equipment
  body:
    type: json
    data: |-
      {
        "recipeId": "{id}",
        "missingEquipment": "Oven"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
