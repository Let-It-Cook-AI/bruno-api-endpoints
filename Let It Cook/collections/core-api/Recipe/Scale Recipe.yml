info:
  name: Scale Recipe
  type: http
  seq: 6

http:
  method: POST
  url: http://localhost:8080/core-api/recipe/{id}/scale
  body:
    type: json
    data: |-
      {
        "recipeId": "{id}",
        "targetServings": 4
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
