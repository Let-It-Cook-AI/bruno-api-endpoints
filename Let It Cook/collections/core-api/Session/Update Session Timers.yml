info:
  name: Update Session Timers
  type: http
  seq: 3

http:
  method: PUT
  url: http://localhost:8080/core-api/session/{id}/timer
  body:
    type: json
    data: |-
      {
        "activeTimersSeconds": {
          "1": 300,
          "2": 600
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
