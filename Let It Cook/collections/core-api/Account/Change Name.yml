info:
  name: Change Name
  type: http
  seq: 5

http:
  method: PUT
  url: http://localhost:8080/core-api/account/name
  body:
    type: json
    data: |-
      {
        "newName": "John Doe"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
