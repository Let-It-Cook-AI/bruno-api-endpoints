info:
  name: Change Email
  type: http
  seq: 2

http:
  method: PUT
  url: http://localhost:8080/core-api/account/email
  body:
    type: json
    data: |-
      {
        "newEmail": "newuser@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
