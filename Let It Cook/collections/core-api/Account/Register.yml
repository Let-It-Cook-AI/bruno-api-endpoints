info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/core-api/account/register
  body:
    type: json
    data: |-
      {
        "email": "user@example.com",
        "password": "password123",
        "username": "johndoe"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
